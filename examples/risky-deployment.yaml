apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-trainer
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gpu-trainer
  template:
    metadata:
      labels:
        app: gpu-trainer
    spec:
      hostNetwork: true
      automountServiceAccountToken: true
      containers:
        - name: trainer
          image: registry.example.com/ml/trainer:latest
          securityContext:
            privileged: true
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
            limits:
              cpu: "8"
              memory: 32Gi
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: gpu-trainer
  namespace: ml
spec:
  type: LoadBalancer
  selector:
    app: gpu-trainer
  ports:
    - port: 8080
      targetPort: 8080
