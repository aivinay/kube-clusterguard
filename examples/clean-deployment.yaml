apiVersion: apps/v1
kind: Deployment
metadata:
  name: preprocessor
  namespace: ml
spec:
  replicas: 1
  selector:
    matchLabels:
      app: preprocessor
  template:
    metadata:
      labels:
        app: preprocessor
    spec:
      automountServiceAccountToken: false
      containers:
        - name: main
          image: registry.example.com/ml/preprocessor:1.2.3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
