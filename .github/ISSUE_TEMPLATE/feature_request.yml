name: Feature request
description: Suggest a rule, report format, or workflow improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What would this help you catch or automate?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the rule, command, output, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples
      description: Include public, scrubbed manifests or expected output if helpful.
